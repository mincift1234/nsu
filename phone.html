<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>전화번호 인증 — JUP</title>

        <link rel="stylesheet" href="styles.css" />

        <style>
            .container {
                max-width: 420px;
                margin: 60px auto;
                padding: 20px 16px;
                background: #1e1e1e;
                border-radius: 14px;
            }

            /* 입력창 */
            input {
                width: 100%;
                padding: 10px 12px;
                margin-top: 6px;
                margin-bottom: 10px;
                background: #111;
                color: white;
                border: 1px solid #333;
                border-radius: 8px;
                font-size: 14px;
            }

            /* 버튼 */
            button {
                width: 100%;
                padding: 12px;
                margin-bottom: 10px;
                background: #ff7a00;
                border: none;
                border-radius: 10px;
                color: white;
                font-weight: 600;
                cursor: pointer;
                font-size: 14px;
            }

            /* 제목 */
            h2 {
                margin-bottom: 18px;
                font-size: 20px;
            }

            /* reCAPTCHA */
            #recaptcha {
                margin-top: 14px;
            }

            /* 🔥 모바일 전용 최적화 */
            @media (max-width: 768px) {
                .container {
                    margin: 40px auto;
                    padding: 18px 14px;
                    border-radius: 16px;
                }

                input {
                    padding: 9px 10px;
                    font-size: 13px;
                }

                button {
                    padding: 11px;
                    font-size: 13px;
                }
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>전화번호 인증</h2>

            <input id="phoneInput" placeholder="01012345678" />

            <button id="sendBtn">인증번호 받기</button>

            <input id="codeInput" placeholder="인증번호" />

            <button id="verifyBtn">인증 완료</button>

            <div id="recaptcha"></div>
        </div>

        <script type="module" src="phone.js"></script>
    </body>
</html>
