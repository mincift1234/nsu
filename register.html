<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>글 등록 — JUP</title>
        <link rel="manifest" href="manifest.webmanifest" />
        <meta name="theme-color" content="#121212" />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap"
            rel="stylesheet" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="mobile.css" media="(max-width: 768px)" />
        <!-- Firebase config: register 페이지에서도 반드시 필요 -->
    </head>
    <body>
        <!-- 상단 바 -->
        <header class="topbar topbar--subpage">
            <div class="top-inner top-inner--subpage">
                <button class="icon-btn hamburger" aria-label="메뉴 열기">
                    <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="20" height="2" rx="1" fill="#bbb" />
                        <rect y="6" width="20" height="2" rx="1" fill="#bbb" />
                        <rect y="12" width="20" height="2" rx="1" fill="#bbb" />
                    </svg>
                </button>

                <a class="brand" href="index.html" aria-label="홈으로">
                    <span class="brand-mark" aria-hidden="true">J</span>
                    <span class="brand-copy">
                        <span class="brand-text">JUP</span>
                        <span class="brand-sub">post editor</span>
                    </span>
                </a>

                <div class="search-box search-box--empty"></div>

                <div id="authArea">
                    <button id="loginBtn" class="chip">Google로 로그인</button>
                    <img id="userAvatar" alt="프로필" referrerpolicy="no-referrer" style="display: none" />
                    <div id="profileMenu" class="hidden" aria-hidden="true">
                        <ul>
                            <li id="profile-info"><a href="profile.html">내 정보</a></li>
                            <li id="profile-logout">로그아웃</li>
                        </ul>
                    </div>
                </div>

                <button id="addBtn" class="add-btn" aria-label="등록" title="등록">
                    <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"></path>
                        <path
                            d="M20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 모바일 햄버거 메뉴 슬라이드 -->
        <div class="mobile-menu-wrap">
            <div class="mobile-menu-overlay"></div>

            <div class="mobile-menu">
                <button class="close-menu" aria-label="메뉴 닫기">✕</button>

                <div class="mobile-menu-section">
                    <input
                        type="search"
                        id="mobileSearchInput"
                        class="mobile-search"
                        placeholder="분실물 검색"
                        aria-label="분실물 검색" />
                </div>

                <hr />

                <button type="button" class="mobile-menu-item" id="mobileWriteBtn">글쓰기</button>

                <hr />

                <button type="button" class="mobile-menu-item" id="mobileMailBtn">쪽지함</button>
            </div>
        </div>

        <main class="container">
            <section class="hero">
                <div class="hero-copy">
                    <p class="hero-kicker">Post Editor</p>
                    <h1 class="hero-text">분실물 글을 빠르게 등록하세요.</h1>
                    <p class="hero-subtext">제목, 위치, 사진만 정확히 적어도 찾는 속도가 크게 올라갑니다.</p>
                </div>
                <div class="hero-notes">
                    <span class="hero-note">위치는 건물명과 층수를 함께 적어주세요.</span>
                    <span class="hero-note">식별이 쉬운 사진 한 장이면 충분합니다.</span>
                </div>
            </section>

            <!-- 등록 카드 -->
            <section class="card register-card">
                <h2 class="page-heading">글 등록</h2>

                <form id="postForm" onsubmit="return false;" class="form-grid register-form-layout">
                    <section class="register-section register-section--primary">
                        <div class="register-section-head">
                            <h3 class="register-section-title">기본 정보</h3>
                            <p class="register-section-text">분실물의 핵심 정보를 먼저 입력해주세요.</p>
                        </div>

                        <div class="register-fields register-fields--two">
                            <div class="form-field">
                                <label for="title" class="label">제목 <span class="req">*</span></label>
                                <input
                                    id="title"
                                    type="text"
                                    class="control"
                                    placeholder="예: 검은 지갑, 파란 우산"
                                    required />
                            </div>

                            <div class="form-field">
                                <label for="category" class="label">카테고리 <span class="req">*</span></label>
                                <select id="category" class="control" required>
                                    <option value="">선택</option>
                                    <option>지갑</option>
                                    <option>가방</option>
                                    <option>의류</option>
                                    <option>전자기기</option>
                                    <option>문서/증명</option>
                                    <option>악세서리</option>
                                    <option>기타</option>
                                </select>
                            </div>

                            <div class="form-field">
                                <label for="location" class="label">발견 위치</label>
                                <input id="location" type="text" class="control" placeholder="예: 도서관 1층 안내데스크" />
                            </div>

                            <div class="form-field">
                                <label for="status" class="label">상태 <span class="req">*</span></label>
                                <select id="status" class="control" required>
                                    <option value="">선택</option>
                                    <option value="보관중">보관중</option>
                                    <option value="찾는중">찾는중</option>
                                    <option value="완료">완료</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <section class="register-section register-section--secondary">
                        <div class="register-section-head">
                            <h3 class="register-section-title">상세 설명</h3>
                            <p class="register-section-text">날짜와 특징을 적으면 찾는 사람이 더 빨리 알아볼 수 있습니다.</p>
                        </div>

                        <div class="register-fields">
                            <div class="form-field">
                                <label class="label">날짜 <span class="req">*</span></label>
                                <div class="date-field">
                                    <div class="date-type-group">
                                        <label class="seg">
                                            <input type="radio" name="dateType" value="found" checked />
                                            <span>습득</span>
                                        </label>
                                        <label class="seg">
                                            <input type="radio" name="dateType" value="lost" />
                                            <span>분실</span>
                                        </label>
                                    </div>
                                    <input id="date" type="date" class="control date-input" required />
                                </div>
                            </div>

                            <div class="form-field">
                                <label for="description" class="label">설명 <span class="req">*</span></label>
                                <textarea
                                    id="description"
                                    rows="5"
                                    class="control"
                                    placeholder="특징, 위치, 픽업 방법 등"
                                    required></textarea>
                            </div>
                        </div>
                    </section>

                    <section class="register-section register-section--media">
                        <div class="register-section-head">
                            <h3 class="register-section-title">사진 업로드</h3>
                            <p class="register-section-text">정면 사진 한 장과 특징이 잘 보이는 사진이 가장 효과적입니다.</p>
                        </div>

                        <div class="register-fields">
                            <div class="form-field col-12">
                                <label class="label">사진 업로드 <span class="req">*</span></label>
                                <label class="file-drop" for="imageInput">이미지 선택 또는 드래그</label>
                                <input id="imageInput" name="image" type="file" accept="image/*" hidden />
                                <div id="preview" class="preview"></div>

                                <label class="toggle-box">
                                    <input type="checkbox" id="mosaicToggle" />
                                    <span>사진에 모자이크 적용</span>
                                </label>
                            </div>
                        </div>
                    </section>

                    <div class="register-actions">
                        <span id="msg" class="hint"></span>
                        <div class="btn-row">
                            <a class="btn" href="index.html">등록 취소</a>
                            <button id="submitBtn" class="btn primary" type="submit">게시글 등록</button>
                        </div>
                    </div>
                </form>
            </section>
        </main>

        <script type="module" src="register.js"></script>
        <script src="mobile-menu.js"></script>
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", function () {
                    navigator.serviceWorker
                        .register("/sw.js")
                        .then(function (reg) {
                            console.log("Service Worker 등록 성공:", reg.scope);
                        })
                        .catch(function (err) {
                            console.error("Service Worker 등록 실패:", err);
                        });
                });
            }
        </script>
    </body>
</html>
